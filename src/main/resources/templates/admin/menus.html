<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{admin.menus})}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav(${principal})}"></nav>

<main class="container">
    <div class="row">
        <h1 th:text="#{admin.menus}">Menus</h1>
        <div class="spacer"></div>
        <a class="btn" th:href="@{/admin/menus/new}" th:text="#{action.new}">New</a>
    </div>
    <div class="card">
        <table>
            <thead>
            <tr>
                <th>#</th>
                <th th:text="#{menu.nameJa}">Name (JA)</th>
                <th th:text="#{menu.nameKo}">Name (KO)</th>
                <th th:text="#{menu.category}">Category</th>
                <th th:text="#{menu.price}">Price</th>
                <th th:text="#{menu.available}">Available</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="m : ${menus}">
                <td th:text="${m.id}">1</td>
                <td th:text="${m.nameJa}">name ja</td>
                <td th:text="${m.nameKo}">name ko</td>
                <td th:text="#{'menu.category.' + ${m.category.name()}}">DRINK</td>
                <td th:text="${m.price}">0</td>
                <td th:text="${m.available} ? '✓' : '—'">-</td>
                <td class="right">
                    <a class="btn btn-sm btn-secondary" th:href="@{'/admin/menus/' + ${m.id} + '/edit'}"
                       th:text="#{action.edit}">Edit</a>
                    <button class="btn btn-sm btn-danger" th:attr="data-id=${m.id}"
                            onclick="deleteMenu(this)" th:text="#{action.delete}">Delete</button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{fragments/layout :: flash}"></div>
<script th:replace="~{fragments/layout :: apiscript}"></script>
<script>
    async function deleteMenu(btn) {
        if (!confirm('Delete?')) return;
        try {
            await api.del('/api/menus/' + btn.dataset.id);
            btn.closest('tr').remove();
        } catch (e) { api.flash(e.message, 'error'); }
    }
</script>
</body>
</html>
