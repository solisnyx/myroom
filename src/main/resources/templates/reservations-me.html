<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{reservation.me.title})}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav(${principal})}"></nav>

<main class="container">
    <h1 th:text="#{reservation.me.title}">My reservations</h1>
    <div class="card">
        <table>
            <thead>
            <tr>
                <th>#</th>
                <th th:text="#{reservation.reservedAt}">When</th>
                <th th:text="#{reservation.partySize}">Party</th>
                <th th:text="#{reservation.room}">Room</th>
                <th th:text="#{reservation.status}">Status</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${reservations}">
                <td th:text="${r.id}">1</td>
                <td th:text="${#temporals.format(r.reservedAt, 'yyyy-MM-dd HH:mm')}">time</td>
                <td th:text="${r.partySize}">2</td>
                <td th:text="${r.roomName} ?: '-'">room</td>
                <td>
                    <span th:class="'badge badge-' + ${r.status}"
                          th:text="#{'reservation.status.' + ${r.status.name()}}">PENDING</span>
                </td>
                <td class="right">
                    <a class="btn btn-sm btn-secondary"
                       th:href="@{'/reservations/' + ${r.id}}"
                       th:text="#{action.view}">View</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(reservations)}">
                <td colspan="6" class="muted" th:text="#{reservation.me.empty}">None</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{fragments/layout :: flash}"></div>
<script th:replace="~{fragments/layout :: apiscript}"></script>
</body>
</html>
