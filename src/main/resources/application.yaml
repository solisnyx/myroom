spring:
  application:
    name: myroom
  datasource:
    url: jdbc:h2:mem:myroom;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      encoding: UTF-8
  h2:
    console:
      enabled: true
      path: /h2-console
  messages:
    basename: messages/messages
    encoding: UTF-8
    fallback-to-system-locale: false
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:your-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:your-kakao-client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image
              - account_email
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-please-use-at-least-32-bytes-long-secret-for-hs256!}
    expiration-ms: 86400000
    issuer: myroom
  oauth:
    success-redirect-url: ${OAUTH_SUCCESS_REDIRECT:/oauth2/success}
